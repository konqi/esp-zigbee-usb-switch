name: Release OTA Firmware

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (e.g. v0.1.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: rel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${TAG}"
            exit 1
          fi

          echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Using release tag: ${TAG}"

      # ---------------------------------------------------------------------------
      # Parse semver from the tag (vM.m.p) and pack into Zigbee OTA fileVersion.
      # app word:   major(4 bits), minor(4 bits), build/patch(8 bits)
      # stack word: derived from espressif/esp-zigbee-lib component version.
      # fileVersion = ((app_release << 24) | (app_build << 16) | (stack_release << 8) | stack_build)
      # ---------------------------------------------------------------------------
      - name: Parse version from tag
        id: ver
        run: |
          TAG="${{ steps.rel.outputs.release_tag }}"
          VER="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          if [ "${MAJOR}" -gt 15 ] || [ "${MINOR}" -gt 15 ] || [ "${PATCH}" -gt 255 ]; then
            echo "Semver out of Zigbee OTA range: major/minor must be <=15 and patch <=255"
            exit 1
          fi

          APP_RELEASE=$(( (MAJOR << 4) | MINOR ))
          APP_BUILD=${PATCH}

          # Read the actual resolved esp-zigbee-lib version from the managed_components
          # manifest (present in CI after component install) with a fallback to the pinned
          # minimum version declared in main/idf_component.yml (always tracked in git).
          STACK_COMPAT_RAW=""
          if [ -f "managed_components/espressif__esp-zigbee-lib/idf_component.yml" ]; then
            STACK_COMPAT_RAW=$(grep -E '^version:' managed_components/espressif__esp-zigbee-lib/idf_component.yml | head -n1 | awk '{print $2}')
          fi
          if [ -z "${STACK_COMPAT_RAW}" ] && [ -f "main/idf_component.yml" ]; then
            # Extract the pinned minimum version (e.g. "^1.6.8" → "1.6.8")
            STACK_COMPAT_RAW=$(grep -E 'esp-zigbee-lib' main/idf_component.yml | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          fi

          STACK_COMPAT_RAW=$(echo "${STACK_COMPAT_RAW}" | tr -d "'\"")
          if [[ ! "${STACK_COMPAT_RAW}" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            STACK_COMPAT_RAW="0.0.0"
          fi

          IFS='.' read -r STACK_MAJOR STACK_MINOR STACK_PATCH <<< "${STACK_COMPAT_RAW}"
          STACK_PATCH=${STACK_PATCH:-0}

          if [ "${STACK_MAJOR}" -gt 15 ] || [ "${STACK_MINOR}" -gt 15 ] || [ "${STACK_PATCH}" -gt 255 ]; then
            echo "Stack version out of Zigbee OTA range from esp-zigbee-lib (${STACK_COMPAT_RAW}): major/minor must be <=15 and patch <=255"
            exit 1
          fi

          STACK_RELEASE=$(( (STACK_MAJOR << 4) | STACK_MINOR ))
          STACK_BUILD=${STACK_PATCH}
          FILE_VERSION=$(( (APP_RELEASE << 24) | (APP_BUILD << 16) | (STACK_RELEASE << 8) | STACK_BUILD ))
          FILE_VERSION_HEX=$(printf '%08X' "${FILE_VERSION}")
          OTA_FILENAME="zigbee-usb-switch-${TAG}.ota"
          echo "major=${MAJOR}"                 >> "${GITHUB_OUTPUT}"
          echo "minor=${MINOR}"                 >> "${GITHUB_OUTPUT}"
          echo "patch=${PATCH}"                 >> "${GITHUB_OUTPUT}"
          echo "app_release=${APP_RELEASE}"       >> "${GITHUB_OUTPUT}"
          echo "app_build=${APP_BUILD}"           >> "${GITHUB_OUTPUT}"
          echo "stack_release=${STACK_RELEASE}"   >> "${GITHUB_OUTPUT}"
          echo "stack_build=${STACK_BUILD}"       >> "${GITHUB_OUTPUT}"
          echo "file_version=${FILE_VERSION}"     >> "${GITHUB_OUTPUT}"
          echo "file_version_hex=${FILE_VERSION_HEX}" >> "${GITHUB_OUTPUT}"
          echo "ota_filename=${OTA_FILENAME}"     >> "${GITHUB_OUTPUT}"
          echo "Parsed tag=${TAG}: semver=${MAJOR}.${MINOR}.${PATCH}, zigbee_stack=${STACK_MAJOR}.${STACK_MINOR}.${STACK_PATCH} packed app_release=${APP_RELEASE} app_build=${APP_BUILD} stack_release=${STACK_RELEASE} stack_build=${STACK_BUILD} → fileversion=0x${FILE_VERSION_HEX} (${FILE_VERSION})"

      # ---------------------------------------------------------------------------
      # Build the firmware with explicit OTA version bytes so the binary carries
      # the same version that will appear in the OTA image header.
      # ---------------------------------------------------------------------------
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32c6
          command: >-
            idf.py
            -D ESP_OTA_APP_RELEASE=${{ steps.ver.outputs.app_release }}
            -D ESP_OTA_APP_BUILD=${{ steps.ver.outputs.app_build }}
            -D ESP_OTA_STACK_RELEASE=${{ steps.ver.outputs.stack_release }}
            -D ESP_OTA_STACK_BUILD=${{ steps.ver.outputs.stack_build }}
            build
        env:
          PROJECT_VER: ${{ steps.rel.outputs.release_tag }}

      # ---------------------------------------------------------------------------
      # Wrap the .bin in a standard Zigbee OTA file using Espressif's tool.
      # Tag 0x0000 = "Upgrade Image" sub-element.
      # ---------------------------------------------------------------------------
      - name: Download OTA image builder
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/espressif/esp-zigbee-sdk/main/tools/image_builder_tool/image_builder_tool.py" \
            -o image_builder_tool.py

      - name: Create OTA image
        run: |
          python3 image_builder_tool.py \
            --manuf-id   0x131B \
            --image-type 0x0001 \
            --file-version ${{ steps.ver.outputs.file_version }} \
            --tag 0x0000 build/zigbee-switcher.bin
          GENERATED="131B-0001-${{ steps.ver.outputs.file_version_hex }}-ota-file.zigbee"
          mv "${GENERATED}" "${{ steps.ver.outputs.ota_filename }}"
          echo "Created OTA image: ${{ steps.ver.outputs.ota_filename }}"

      - name: Compute checksum and file size
        id: meta
        run: |
          OTA="${{ steps.ver.outputs.ota_filename }}"
          echo "sha512=$(sha512sum "${OTA}" | awk '{print $1}')"  >> "${GITHUB_OUTPUT}"
          echo "filesize=$(wc -c < "${OTA}" | tr -d ' ')"        >> "${GITHUB_OUTPUT}"

      # ---------------------------------------------------------------------------
      # Prepend the new entry to z2m_converter/ota-index.json so zigbee2mqtt
      # can discover the update via a custom OTA index URL.
      # ---------------------------------------------------------------------------
      - name: Fetch release notes from GitHub release body
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.rel.outputs.release_tag }}
        run: |
          BODY=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('body', '') or '')")
          # Store multi-line value safely using GITHUB_OUTPUT delimiter
          {
            echo "release_notes<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "Fetched release notes (${#BODY} chars)"

      - name: Update ota-index.json
        env:
          RELEASE_TAG: ${{ steps.rel.outputs.release_tag }}
          OTA_FILENAME: ${{ steps.ver.outputs.ota_filename }}
          FILE_VERSION: ${{ steps.ver.outputs.file_version }}
          FILE_SIZE: ${{ steps.meta.outputs.filesize }}
          SHA512: ${{ steps.meta.outputs.sha512 }}
          RELEASE_NOTES: ${{ steps.notes.outputs.release_notes }}
        run: |
          python3 - <<'PYEOF'
          import json, os

          repo         = os.environ["GITHUB_REPOSITORY"]
          tag          = os.environ["RELEASE_TAG"]
          ota_fn       = os.environ["OTA_FILENAME"]
          file_ver     = int(os.environ["FILE_VERSION"])
          file_size    = int(os.environ["FILE_SIZE"])
          sha512       = os.environ["SHA512"]
          release_notes = os.environ.get("RELEASE_NOTES", "").strip()

          url = f"https://github.com/{repo}/releases/download/{tag}/{ota_fn}"

          new_entry = {
              "fileVersion":      file_ver,
              "fileSize":         file_size,
              "url":              url,
              "imageType":        1,
              "manufacturerCode": 4891,
              "modelId":          "zigbee-usb-switch",
              "manufacturerName": "KONQI",
              "sha512":           sha512,
          }
          if release_notes:
              new_entry["releaseNotes"] = release_notes

          index_path = "z2m_converter/ota-index.json"
          with open(index_path, "r") as f:
              entries = json.load(f)

          # Keep latest version first and avoid duplicate entries for the same
          # device/version tuple if the workflow is re-run for a tag.
          entries = [
              entry for entry in entries
              if not (
                  entry.get("fileVersion") == new_entry["fileVersion"]
                  and entry.get("imageType") == new_entry["imageType"]
                  and entry.get("manufacturerCode") == new_entry["manufacturerCode"]
                  and entry.get("modelId") == new_entry["modelId"]
                  and entry.get("manufacturerName") == new_entry["manufacturerName"]
              )
          ]
          entries.insert(0, new_entry)

          with open(index_path, "w") as f:
              json.dump(entries, f, indent=2)
              f.write("\n")

          print(f"Updated {index_path}: added version {file_ver:#010x} ({url})")
          PYEOF

      - name: Commit updated ota-index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Start from latest main to avoid detached-tag/non-fast-forward issues.
          git fetch origin main
          git switch -C ota-index-update origin/main

          git add z2m_converter/ota-index.json
          if git diff --cached --quiet; then
            echo "ota-index.json unchanged, skipping commit"
            exit 0
          fi

          git commit -m "chore: update ota-index for ${{ steps.rel.outputs.release_tag }}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed ota-index update on attempt ${attempt}"
              exit 0
            fi

            echo "Push rejected (attempt ${attempt}), rebasing onto latest origin/main"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push ota-index.json update after retries"
          exit 1

      # ---------------------------------------------------------------------------
      # Create a GitHub Release and attach the .ota file.
      # Run this only after ota-index is committed so we don't publish a stale
      # release when the index update fails.
      # ---------------------------------------------------------------------------
      - name: Create GitHub release and upload OTA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.release_tag }}
          files: ${{ steps.ver.outputs.ota_filename }}
          generate_release_notes: true
